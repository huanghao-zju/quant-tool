# 信号→动作表（SPEC §1）
# 部署前由用户本人填写具体标的、比例、执行时限。
# 阶段迁移推送时，对应行文案会被原样附在告警消息中。

green_to_yellow: |
  🟡 黄色告警（贬值失控确认）：停止一切高 beta 加仓，冻结新增仓位；复核当前持仓与总仓位水平，做好减仓预案。
yellow_to_orange: |
  🟠 橙色告警（政策被迫转向）：24 小时内执行减仓，降低高 beta 敞口，不做二次确认。
orange_to_red: |
  🔴 红色告警（套息平仓+全球传导）：高 beta 仓位全部清仓，执行既定下限；启用现金弹药清单。
downgrade: |
  ⬇️ 降级：恢复常规节奏，记录本次事件复盘。
