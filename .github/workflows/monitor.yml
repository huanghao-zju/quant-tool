name: crisis-monitor

on:
  schedule:
    - cron: "0 22 * * 1-5"    # UTC 22:00 美国收盘后（FRED/美股）
    - cron: "30 7 * * 1-5"    # UTC 07:30 东京收盘后（JGB/日经/USDJPY）
    - cron: "0 23 * * 5"      # UTC 周五23:00 = 北京时间周六早7点 → 周报
  workflow_dispatch:
    inputs:
      weekly:
        description: "强制发周报"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

defaults:
  run:
    working-directory: monitoring

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: monitoring/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PUSH_WEBHOOK_URL: ${{ secrets.PUSH_WEBHOOK_URL }}
          PUSH_WEBHOOK_SECRET: ${{ secrets.PUSH_WEBHOOK_SECRET }}
        run: |
          FLAGS=""
          if [ "${{ github.event.schedule }}" = "0 23 * * 5" ] || [ "${{ inputs.weekly }}" = "true" ]; then
            FLAGS="--weekly"
          fi
          python -m src.main $FLAGS

      - name: Persist state
        run: |
          git config user.name "crisis-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json fault_counts.json dashboard_score.json || true
          git diff --cached --quiet || git commit -m "chore: update state $(date -u +%F)"
          git push
