name: crisis-monitor

on:
  schedule:
    - cron: "0 22 * * 1-5"    # UTC 22:00 美国收盘后（FRED/美股）
    - cron: "30 7 * * 1-5"    # UTC 07:30 东京收盘后（JGB/日经/USDJPY）
    - cron: "0 23 * * 5"      # UTC 周五23:00 = 北京时间周六早7点 → 周报
  workflow_dispatch:
    inputs:
      weekly:
        description: "强制发周报"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

defaults:
  run:
    working-directory: monitoring

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: monitoring/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PUSH_WEBHOOK_URL: ${{ secrets.PUSH_WEBHOOK_URL }}
          PUSH_WEBHOOK_SECRET: ${{ secrets.PUSH_WEBHOOK_SECRET }}
        run: |
          FLAGS=""
          if [ "${{ github.event.schedule }}" = "0 23 * * 5" ] || [ "${{ inputs.weekly }}" = "true" ]; then
            FLAGS="--weekly"
          elif [ "${{ github.event.schedule }}" = "30 7 * * 1-5" ]; then
            FLAGS="--heartbeat"   # 工作日东京收盘后一跑发平安报（存活探测）
          fi
          python -m src.main $FLAGS

      - name: Persist state
        run: |
          git config user.name "crisis-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json fault_counts.json dashboard_score.json alerted_faults.json || true
          git diff --cached --quiet || git commit -m "chore: update state $(date -u +%F)"
          git push

      # 任务失败告警：抓"跑了但报错"的失败模式（SPEC §5.5 防止沉默的坏掉）。
      # "任务根本没被触发"的模式由平安报的缺席兜底。
      - name: Notify on failure
        if: failure()
        env:
          PUSH_WEBHOOK_URL: ${{ secrets.PUSH_WEBHOOK_URL }}
          PUSH_WEBHOOK_SECRET: ${{ secrets.PUSH_WEBHOOK_SECRET }}
        run: |
          python -c "from src.notify import push; push('**[监控任务失败]** ⚠️ crisis-monitor GitHub Actions 运行失败，请查看日志：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')" || \
            curl -s -X POST "$PUSH_WEBHOOK_URL" -H 'Content-Type: application/json' \
              -d '{"msg_type":"text","content":{"text":"[监控任务失败] crisis-monitor Actions 运行失败，请查看 GitHub Actions 日志"}}'
